// Generate realistic time slots for today + next 6 days
function generateSlots(bookedIndices = []) {
  const times = [
    "9:00 AM","9:30 AM","10:00 AM","10:30 AM","11:00 AM","11:30 AM",
    "12:00 PM","2:00 PM","2:30 PM","3:00 PM","3:30 PM","4:00 PM","4:30 PM","5:00 PM",
  ];
  return times.map((t, i) => ({
    time: t,
    status: bookedIndices.includes(i) ? "booked" : "available",
  }));
}

function getDates() {
  const dates = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date();
    d.setDate(d.getDate() + i);
    dates.push(d.toISOString().split("T")[0]);
  }
  return dates;
}

function buildSlotsByDate(bookedMap = {}) {
  const dates = getDates();
  const result = {};
  dates.forEach((date, idx) => {
    result[date] = generateSlots(bookedMap[idx] || []);
  });
  return result;
}

